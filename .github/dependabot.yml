version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 3
    groups:
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      vscode:
        patterns:
          - "@vscode/*"
          - "@types/vscode"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 3
