name: vsixbuilder

on:
  pull_request:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build_vsix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-x64
          - target: darwin-arm64
          - target: linux-x64
          - target: win32-x64
          - target: win32-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup VSCE
        run: sudo yarn global add vsce@latest

      - name: Install dependencies
        run: yarn install

      - name: Build platform-specific VSIX
        run: |
          vsce package --target ${{ matrix.target }} \
            --baseContentUrl https://github.com/GitGuardian/gitguardian-vscode/ \
            --allow-missing-repository
        env:
          GGSHIELD_TARGET: ${{ matrix.target }}

      - name: Upload extension package
        uses: actions/upload-artifact@v4
        with:
          name: gitguardian-${{ matrix.target }}.vsix
          path: gitguardian-*.vsix
