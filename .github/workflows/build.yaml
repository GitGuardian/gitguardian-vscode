name: vsixbuilder

on:
  pull_request:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build_vsix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-x64
          - target: darwin-arm64
          - target: linux-x64
          - target: win32-x64
          - target: win32-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js and tools
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: npm ci

      - name: Build platform-specific VSIX
        env:
          GGSHIELD_TARGET: ${{ matrix.target }}
        run: |
          npx vsce package --target ${{ matrix.target }} \
            --baseContentUrl https://github.com/GitGuardian/gitguardian-vscode/ \
            --allow-missing-repository


      - name: Upload extension package
        uses: actions/upload-artifact@v7
        with:
          name: gitguardian-${{ matrix.target }}.vsix
          path: gitguardian-*.vsix
